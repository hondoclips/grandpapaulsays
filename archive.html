<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grandpa Paul — All Words</title>
<meta name="description" content="Every word Grandpa Paul has shared. One a day. Every morning.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:clip}
body{
  background:#d9d3ca;
  color:#111;
  font-family:'Inter',sans-serif;
  overflow-x:clip;
  width:100%;
}

/* ── NAV ── */
nav{
  position:relative;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 56px;
  background:#d9d3ca;
}
.nav-logo{
  text-decoration:none;
  display:flex;flex-direction:column;line-height:1.2;
}
.nav-logo-title{
  font-family:'Playfair Display',serif;
  font-size:17px;font-weight:700;letter-spacing:1px;
  color:#111;
}
.nav-logo-sub{
  font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;
  color:rgba(0,0,0,0.4);
}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{
  font-size:13px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;
  color:rgba(0,0,0,0.45);text-decoration:none;
  transition:color 0.2s;
}
.nav-links a:hover{color:#111}
.nav-ig{
  background:#111;color:#fff !important;
  padding:9px 20px;border-radius:100px;
  font-size:12px !important;letter-spacing:1px;
  transition:background 0.2s !important;
}
.nav-ig:hover{background:#333 !important}

/* ── PAGE ── */
.page{
  padding:80px 56px 120px;
  max-width:1200px;
  margin:0 auto;
}
.page-header{
  margin-bottom:56px;
}
.page-label{
  font-size:11px;letter-spacing:4px;text-transform:uppercase;font-weight:600;
  color:rgba(0,0,0,0.35);margin-bottom:16px;
}
.page-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(36px,5vw,64px);font-weight:700;
  color:#111;line-height:1.1;
}
.archive-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
.archive-card{
  background:linear-gradient(145deg,#1c1c1c 0%,#111 60%,#0d0d0d 100%);
  border-radius:20px;
  padding:40px 36px;
  border:1px solid rgba(255,255,255,0.07);
  box-shadow:0 1px 0 rgba(255,255,255,0.08) inset, 0 8px 20px rgba(0,0,0,0.10), 0 24px 48px rgba(0,0,0,0.12);
  cursor:pointer;
  transition:box-shadow 0.25s ease;
}
.archive-card:hover{
  box-shadow:0 1px 0 rgba(255,255,255,0.1) inset, 0 8px 30px rgba(0,0,0,0.24), 0 40px 80px rgba(0,0,0,0.10);
}
.archive-word{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,2.5vw,32px);font-weight:900;color:#fff;
  letter-spacing:-1px;line-height:0.95;
  margin-bottom:12px;
  overflow-wrap:break-word;word-break:break-word;
}
.archive-pos{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,0.3);font-weight:500;
  border:1px solid rgba(255,255,255,0.12);
  display:inline-block;padding:4px 14px;border-radius:100px;
}

/* ── MODAL ── */
.modal-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.82);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal-card{
  width:90%;max-width:560px;
  background:linear-gradient(145deg,#1c1c1c 0%,#111 60%,#0d0d0d 100%);
  border-radius:24px;
  padding:56px 48px;
  position:relative;
  border:1px solid rgba(255,255,255,0.07);
  box-shadow:0 40px 100px rgba(0,0,0,0.20);
  transform:translateY(24px) scale(0.97);
  transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);
  text-align:center;
}
.modal-backdrop.open .modal-card{transform:translateY(0) scale(1)}
.modal-card::before{
  content:'';
  position:absolute;top:0;left:8%;right:8%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
}
.modal-close{
  position:absolute;top:20px;right:20px;
  width:32px;height:32px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:50%;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s;
  color:rgba(255,255,255,0.5);
  font-size:16px;line-height:1;
}
.modal-close:hover{background:rgba(255,255,255,0.15)}
.modal-label{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:24px}
.modal-word{
  font-family:'Playfair Display',serif;
  font-size:clamp(44px,8vw,80px);font-weight:900;line-height:0.95;
  color:#fff;margin-bottom:16px;letter-spacing:-2px;
}
.modal-pron{font-family:'Playfair Display',serif;font-size:17px;font-style:italic;color:rgba(255,255,255,0.35);margin-bottom:14px}
.modal-pos{
  display:inline-block;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:500;
  color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.12);
  padding:5px 18px;border-radius:100px;margin-bottom:28px;
}
.modal-def{
  font-family:'Playfair Display',serif;
  font-size:clamp(15px,2vw,18px);font-style:italic;
  color:rgba(255,255,255,0.55);line-height:1.7;
  border-top:1px solid rgba(255,255,255,0.07);padding-top:24px;
}
.audio-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:50%;cursor:pointer;
  transition:background 0.2s;flex-shrink:0;
}
.audio-btn:hover{background:rgba(255,255,255,0.15)}
.audio-btn.playing{background:rgba(255,255,255,0.18)}
.audio-btn .icon-play{display:block}
.audio-btn .icon-pause{display:none}
.audio-btn.playing .icon-play{display:none}
.audio-btn.playing .icon-pause{display:block}

/* ── FOOTER ── */
footer{
  background:#1a1714;
  border-top:1px solid rgba(255,255,255,0.06);
  padding:36px 56px;
  display:flex;align-items:center;justify-content:space-between;
}
.footer-logo{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:700;letter-spacing:1px;
  color:rgba(255,255,255,0.3);
}
.footer-links{display:flex;gap:24px}
.footer-links a{
  font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;
  color:rgba(255,255,255,0.25);text-decoration:none;
  transition:color 0.2s;
}
.footer-links a:hover{color:#fff}

@media(max-width:768px){
  nav{padding:18px 20px}
  .nav-links a:not(.nav-ig){display:none}
  .page{padding:60px 20px 80px}
  .archive-grid{grid-template-columns:1fr;gap:12px}
  .archive-card{padding:28px 24px}
  footer{padding:28px 20px;flex-direction:column;gap:16px}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-title">Word of the Day</span>
    <span class="nav-logo-sub">with Grandpa Paul</span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#about">About</a>
    <a href="index.html#follow">Follow</a>
    <a href="https://instagram.com/with_grandpa_paul" target="_blank" class="nav-ig">Instagram</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-label">The Collection</div>
    <h1 class="page-title">Every Word So Far</h1>
  </div>
  <div class="archive-grid" id="archive-grid"></div>
</div>

<div class="modal-backdrop" id="word-modal">
  <div class="modal-card">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-label">Past Word</div>
    <div class="modal-word" id="modal-word"></div>
    <div class="modal-pron" id="modal-pron"></div>
    <div class="modal-pos" id="modal-pos"></div>
    <div class="modal-def" id="modal-def"></div>
    <button class="audio-btn" id="modal-audio-btn" aria-label="Play" style="margin-top:24px;">
      <svg class="icon-play" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 2l7 4-7 4V2z" fill="rgba(255,255,255,0.5)"/></svg>
      <svg class="icon-pause" width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2.5" y="2" width="2.5" height="8" rx="1" fill="rgba(255,255,255,0.5)"/><rect x="7" y="2" width="2.5" height="8" rx="1" fill="rgba(255,255,255,0.5)"/></svg>
    </button>
  </div>
</div>

<footer>
  <div class="footer-logo">Grandpa Paul</div>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="https://instagram.com/with_grandpa_paul" target="_blank">Instagram</a>
  </div>
</footer>

<script>
fetch('data.json?v='+Date.now())
  .then(r=>r.json())
  .then(data=>{
    const grid=document.getElementById('archive-grid');
    const all=[...data.past];
    all.forEach(w=>{
      const c=document.createElement('div');
      c.className='archive-card';
      c.innerHTML=`<div class="archive-word">${w.word}</div>
        <div class="archive-pos">${w.pos}</div>`;
      c.addEventListener('click',()=>openModal(w));
      grid.appendChild(c);
    });
  });

// Modal
const modal=document.getElementById('word-modal');
const modalAudioBtn=document.getElementById('modal-audio-btn');
let modalAudio=null;
function openModal(w){
  document.getElementById('modal-word').textContent=w.word;
  document.getElementById('modal-pron').textContent=w.pron;
  document.getElementById('modal-pos').textContent=w.pos;
  document.getElementById('modal-def').textContent=w.def;
  if(modalAudio){modalAudio.pause();modalAudio=null;}
  modalAudioBtn.classList.remove('playing');
  if(w.audio){
    modalAudio=new Audio(w.audio);
    modalAudio.addEventListener('ended',()=>modalAudioBtn.classList.remove('playing'));
    modalAudioBtn.style.display='inline-flex';
  } else {
    modalAudioBtn.style.display='none';
  }
  modal.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  if(modalAudio){modalAudio.pause();modalAudioBtn.classList.remove('playing');}
  modal.classList.remove('open');
  document.body.style.overflow='';
}
modalAudioBtn.addEventListener('click',()=>{
  if(!modalAudio)return;
  if(modalAudio.paused){modalAudio.currentTime=0;modalAudio.play();modalAudioBtn.classList.add('playing');}
  else{modalAudio.pause();modalAudioBtn.classList.remove('playing');}
});
document.getElementById('modal-close').addEventListener('click',closeModal);
modal.addEventListener('click',e=>{if(e.target===modal)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
</script>
</body>
</html>
